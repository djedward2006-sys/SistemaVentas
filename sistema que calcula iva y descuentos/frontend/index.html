<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Calculadora de Producto</title>
  <link rel="stylesheet" href="asset/css/index.css">
</head>
<body>

  <h2>Calcular Valor Final</h2>

  <form id="formulario">
    <input type="text" id="codigo" placeholder="Código del producto" required>
    <input type="text" id="nombre" placeholder="Nombre del producto" required>
    <input type="number" id="costoBase" placeholder="Costo base" required>
    <input type="number" id="iva" placeholder="IVA (%)" required>
    <input type="number" id="descuento" placeholder="Descuento (%)" required>

    <button type="submit">Calcular</button>
  </form>

  <h3 id="resultado"></h3>

  <script src="asset/js/index.js"></script>

</body>
</html>
